<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electron 41 Smoke App</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 48px));
        background: #ffffff;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        padding: 32px;
        box-shadow: 0 18px 45px rgba(19, 32, 54, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 24px;
        color: #526075;
      }

      button {
        min-width: 136px;
        height: 44px;
        border: 0;
        border-radius: 6px;
        background: #1769e0;
        color: #ffffff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      .counter {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .value {
        min-width: 48px;
        font-size: 28px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main data-testid="sample-dashboard">
      <h1 data-testid="dashboard-heading">Electron 41 Smoke App</h1>
      <p data-testid="automation-status">Ready for automation</p>
      <section class="counter" aria-label="Counter">
        <span class="value" data-testid="counter-value">0</span>
        <button type="button" data-testid="increment-button">Increment</button>
      </section>
    </main>
    <script>
      const counter = document.querySelector('[data-testid="counter-value"]');
      const button = document.querySelector('[data-testid="increment-button"]');

      button.addEventListener('click', () => {
        counter.textContent = String(Number(counter.textContent) + 1);
      });
    </script>
  </body>
</html>
